ktor {
    development = true
    deployment {
        port = 8098
        watch = [resources]
    }

    application {
        modules = [cc.loac.ApplicationKt.module]
    }

    cors {
        # true 表示允许任意域名（仅开发环境使用，生产环境必须 false）
        anyHost = true
        # 当 anyHost = false 时，填写允许的前端域名列表
        allowedHosts = ["http://localhost:5173", "http://localhost:3000"]
    }

    storage {
;          driverClassName="org.mariadb.jdbc.Driver"
;          jdbcURL="jdbc:mariadb://localhost:3306/nola?serverTimezone=Asia/Shanghai&useUnicode=true"

        driverClassName="com.mysql.cj.jdbc.Driver"
        jdbcURL="jdbc:mysql://localhost:3306/nola?serverTimezone=Asia/Shanghai&useUnicode=true"

;        driverClassName="org.h2.Driver"
;        jdbcURL="jdbc:h2:file:./.nola/db"


        databaseName="nola"
        username="root"
        password="123456"
    }

    redis {
        redisURL="redis://localhost:6379"
    }
}

jwt {
    issuer = "http://0.0.0.0:8098"
    domain = "http://0.0.0.0:8098"
    audience = "users"
    realm = "Nola"
    secret = "jwt-secret"
}

accessLog {
    maxLength = 1000
}